name: AI Radar Africa — Daily Brief

on:
  schedule:
    # 3:00 AM UTC = 6:00 AM Nairobi (EAT, UTC+3)
    - cron: "0 3 * * *"
  workflow_dispatch:  # allow manual runs from GitHub UI

jobs:
  daily-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create outputs & logs dirs
        run: mkdir -p outputs logs

      - name: Write Gmail token from secret
        # token.json is stored as a GitHub Secret (base64-encoded)
        run: |
          echo "${{ secrets.GMAIL_TOKEN_B64 }}" | base64 -d > token.json

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GMAIL_SENDER:      ${{ secrets.GMAIL_SENDER }}
          BRIEF_RECIPIENT:   ${{ secrets.BRIEF_RECIPIENT }}
        run: python main.py

      - name: Commit outputs to repo
        run: |
          git config user.name  "AI Radar Bot"
          git config user.email "actions@github.com"
          git add outputs/
          git diff --staged --quiet || git commit -m "Daily brief $(date +%Y-%m-%d)"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
