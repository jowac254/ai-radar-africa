name: AI Radar Africa — Daily Brief

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  daily-brief:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements_no_api.txt

      - name: Create outputs & logs dirs
        run: mkdir -p outputs logs

      - name: Write Gmail token from secret
        run: |
          echo "${{ secrets.GMAIL_TOKEN_B64 }}" | base64 -d > token.json

      - name: Run pipeline (no-API version)
        env:
          GMAIL_SENDER:    ${{ secrets.GMAIL_SENDER }}
          BRIEF_RECIPIENT: ${{ secrets.BRIEF_RECIPIENT }}
        run: python main_no_api.py

      - name: Commit outputs to repo
        run: |
          git config user.name  "AI Radar Bot"
          git config user.email "actions@github.com"
          git add outputs/
          git diff --staged --quiet || git commit -m "Daily brief $(date +%Y-%m-%d)"
          git pull --rebase origin main
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
